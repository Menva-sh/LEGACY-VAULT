<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LEGACY VAULT - Secure Digital Legacy</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <h1> LEGACY VAULT</h1>
      <p>Secure your digital legacy</p>

      <!-- Alert Messages -->
      <div id="alertContainer"></div>

      <!-- Login Tab Content -->
      <form id="loginForm">
        <h3>Login</h3>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Sign In</button>
        <p style="text-align: center; margin-top: 20px; color: var(--text-light);">
          Don't have an account? <a href="#" onclick="switchToRegister()" style="color: var(--primary); font-weight: 600;">Register</a>
        </p>
      </form>

      <!-- Register Tab Content -->
      <form id="registerForm" style="display: none;">
        <h3>Create Account</h3>
        <div class="form-group">
          <label>First Name</label>
          <input type="text" id="registerFirstName" placeholder="John" required>
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" id="registerLastName" placeholder="Doe" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="registerEmail" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="registerPassword" placeholder="••••••••" minlength="6" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Create Account</button>
        <p style="text-align: center; margin-top: 20px; color: var(--text-light);">
          Already have an account? <a href="#" onclick="switchToLogin()" style="color: var(--primary); font-weight: 600;">Login</a>
        </p>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    // Check if already logged in
    if (isLoggedIn()) {
      window.location.href = '/pages/dashboard.html';
    }

    function switchToRegister() {
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('registerForm').style.display = 'block';
    }

    function switchToLogin() {
      document.getElementById('registerForm').style.display = 'none';
      document.getElementById('loginForm').style.display = 'block';
    }

    // Login Form
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      try {
        await loginUser(email, password);
        showAlert('Login successful!', 'success');
        setTimeout(() => {
          window.location.href = '/pages/dashboard.html';
        }, 1000);
      } catch (error) {
        showAlert(error.message, 'danger');
      }
    });

    // Register Form
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const firstName = document.getElementById('registerFirstName').value;
      const lastName = document.getElementById('registerLastName').value;
      const email = document.getElementById('registerEmail').value;
      const password = document.getElementById('registerPassword').value;

      try {
        await registerUser(email, password, firstName, lastName);
        showAlert('Account created successfully!', 'success');
        setTimeout(() => {
          window.location.href = '/pages/dashboard.html';
        }, 1000);
      } catch (error) {
        showAlert(error.message, 'danger');
      }
    });

    function showAlert(message, type) {
      const alertDiv = document.createElement('div');
      alertDiv.className = `alert alert-${type}`;
      alertDiv.innerHTML = `
        <span>${message}</span>
        <button style="background:none; border:none; cursor:pointer; font-size:18px; color:inherit;">×</button>
      `;

      document.getElementById('alertContainer').appendChild(alertDiv);
      alertDiv.querySelector('button').addEventListener('click', () => {
        alertDiv.remove();
      });

      setTimeout(() => alertDiv.remove(), 5000);
    }
  </script>
</body>
</html>
