<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legacy Vault — Executor Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#faf6f0; --cream2:#f3ede3; --cream3:#ede5d8;
  --plum:#5c1d3b; --plum2:#7a2d52; --plum-light:#9b4a6e;
  --plum-pale:#f5e8ef; --plum-ultra:#fdf2f6;
  --sidebar:#130810;
  --muted:#8a7080; --text:#1e0f18; --text2:#6b4f5e;
  --white:#fff; --border:rgba(92,29,59,0.1);
  --green:#22c55e; --amber:#f59e0b; --blue:#6366f1; --red:#ef4444;
  --green-bg:rgba(34,197,94,0.08); --amber-bg:rgba(245,158,11,0.08);
  --red-bg:rgba(239,68,68,0.08); --blue-bg:rgba(99,102,241,0.08);
}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);overflow:hidden}
.app{display:flex;height:100vh;overflow:hidden}

/* ════════════════════════════════════
   SIDEBAR
════════════════════════════════════ */
.sidebar{
  width:272px;flex-shrink:0;
  background:var(--sidebar);
  display:flex;flex-direction:column;
  overflow:hidden;position:relative;
}
.sidebar::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 200px 200px at 50% 0%,rgba(155,74,110,0.22) 0%,transparent 100%);
}
/* brand */
.sb-brand{
  padding:1.1rem 1.1rem 1rem;
  border-bottom:1px solid rgba(255,255,255,0.05);
  flex-shrink:0;position:relative;z-index:1;
}
.sb-logo-row{display:flex;align-items:center;gap:0.6rem;margin-bottom:1rem}
.sb-logo-icon{
  width:34px;height:34px;border-radius:8px;flex-shrink:0;
  background:linear-gradient(135deg,var(--plum-light),var(--plum));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 12px rgba(92,29,59,0.5);
}
.sb-logo-icon svg{width:16px;height:16px;fill:var(--cream)}
.sb-logo-text{}
.sb-brand-name{font-family:'Cormorant Garamond',serif;font-size:0.92rem;font-weight:600;color:rgba(250,246,240,0.9);letter-spacing:0.03em}
.sb-brand-sub{font-size:0.58rem;color:rgba(250,246,240,0.28);letter-spacing:0.09em;text-transform:uppercase;margin-top:1px}
/* asset pill */
.sb-asset-pill{
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);
  border-radius:9px;padding:0.65rem 0.8rem;
  display:flex;align-items:center;gap:0.6rem;
}
.sb-app-icon{width:28px;height:28px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px}
.sb-pill-info{flex:1;min-width:0}
.sb-pill-name{font-size:0.8rem;font-weight:600;color:rgba(250,246,240,0.85);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-pill-cat{font-size:0.6rem;color:rgba(250,246,240,0.3);text-transform:uppercase;letter-spacing:0.07em;margin-top:1px}
.sb-action-tag{
  flex-shrink:0;font-size:0.57rem;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;
  padding:0.18rem 0.5rem;border-radius:100px;
}
.tag-pass{background:rgba(99,102,241,0.18);color:#a5b4fc;border:1px solid rgba(99,102,241,0.25)}
.tag-delete{background:rgba(239,68,68,0.15);color:#fca5a5;border:1px solid rgba(239,68,68,0.22)}
.tag-message{background:rgba(34,197,94,0.15);color:#86efac;border:1px solid rgba(34,197,94,0.22)}
/* progress */
.sb-prog{margin-top:0.65rem}
.sb-prog-meta{display:flex;justify-content:space-between;font-size:0.6rem;color:rgba(250,246,240,0.28);margin-bottom:0.3rem}
.sb-prog-track{height:2px;background:rgba(255,255,255,0.06);border-radius:100px;overflow:hidden}
.sb-prog-fill{height:100%;background:linear-gradient(90deg,var(--plum-light),#c084a0);border-radius:100px;transition:width 0.5s ease}
/* steps nav */
.sb-steps{flex:1;overflow-y:auto;padding:0.6rem 0.65rem;scrollbar-width:none}
.sb-steps::-webkit-scrollbar{display:none}
.sb-step{
  display:flex;align-items:flex-start;gap:0.6rem;
  padding:0.6rem 0.55rem;border-radius:8px;cursor:pointer;
  transition:background 0.15s;margin-bottom:2px;
}
.sb-step:hover:not(.active){background:rgba(255,255,255,0.03)}
.sb-step.active{background:rgba(92,29,59,0.38);border:1px solid rgba(155,74,110,0.22)}
.sb-step.done .sb-num{border-color:transparent!important;background:rgba(34,197,94,0.18)!important;color:var(--green)!important}
.sb-num{
  width:22px;height:22px;border-radius:50%;flex-shrink:0;
  border:1.5px solid rgba(255,255,255,0.1);
  display:flex;align-items:center;justify-content:center;
  font-size:0.62rem;font-weight:600;color:rgba(250,246,240,0.35);
  transition:all 0.2s;margin-top:1px;
}
.sb-step.active .sb-num{background:var(--plum);border-color:var(--plum);color:var(--cream);box-shadow:0 0 0 3px rgba(92,29,59,0.4)}
.sb-step-info{flex:1;min-width:0}
.sb-step-title{font-size:0.78rem;font-weight:500;color:rgba(250,246,240,0.45);line-height:1.3;transition:color 0.15s}
.sb-step.active .sb-step-title{color:rgba(250,246,240,0.9)}
.sb-step.done .sb-step-title{color:rgba(250,246,240,0.3);text-decoration:line-through;text-decoration-color:rgba(34,197,94,0.35)}
.sb-step-desc{font-size:0.65rem;color:rgba(250,246,240,0.22);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-connector{width:1px;height:12px;background:rgba(255,255,255,0.05);margin:1px 0 1px calc(0.55rem + 10px)}
/* footer */
.sb-footer{padding:0.85rem 1rem;border-top:1px solid rgba(255,255,255,0.05);flex-shrink:0}
.sb-exec-row{display:flex;align-items:center;gap:0.6rem}
.sb-exec-ava{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--plum-light),var(--plum));display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:600;color:var(--cream);flex-shrink:0}
.sb-exec-name{font-size:0.76rem;font-weight:500;color:rgba(250,246,240,0.65)}
.sb-exec-role{font-size:0.6rem;color:rgba(250,246,240,0.28)}
.sb-exec-badge{margin-left:auto;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2);border-radius:100px;padding:0.2rem 0.5rem;font-size:0.57rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--green)}

/* ════════════════════════════════════
   MAIN
════════════════════════════════════ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;background:var(--cream2)}

/* topbar */
.topbar{
  height:50px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:0 1.5rem;
  background:rgba(250,246,240,0.92);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
}
.tb-left{display:flex;align-items:center;gap:0.5rem;font-size:0.73rem;color:var(--text2)}
.tb-sep{color:var(--muted)}
.tb-active{color:var(--plum);font-weight:600}
.tb-pill{background:var(--plum-pale);border:1px solid rgba(92,29,59,0.15);border-radius:100px;padding:0.28rem 0.75rem;font-size:0.65rem;font-weight:600;color:var(--plum);letter-spacing:0.02em}
.tb-right{display:flex;align-items:center;gap:0.55rem}
.tb-btn{display:flex;align-items:center;gap:0.35rem;padding:0.38rem 0.8rem;border-radius:7px;font-size:0.71rem;font-weight:500;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all 0.18s}
.tb-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.tb-ghost:hover{background:var(--plum-pale);color:var(--plum);border-color:rgba(92,29,59,0.18)}
.tb-solid{background:var(--plum);color:var(--cream)}
.tb-solid:hover{background:var(--plum2)}
.tb-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0}

/* asset picker */
.asset-bar{
  flex-shrink:0;background:var(--white);border-bottom:1px solid var(--border);
  padding:0.65rem 1.5rem;display:flex;align-items:center;gap:0.55rem;
  overflow-x:auto;scrollbar-width:none;
}
.asset-bar::-webkit-scrollbar{display:none}
.asset-chip{
  display:flex;align-items:center;gap:0.45rem;
  padding:0.35rem 0.75rem 0.35rem 0.45rem;
  border-radius:100px;border:1.5px solid var(--border);
  cursor:pointer;transition:all 0.18s;white-space:nowrap;flex-shrink:0;
  background:transparent;font-family:'DM Sans',sans-serif;
}
.asset-chip:hover{border-color:rgba(92,29,59,0.2);background:var(--plum-ultra)}
.asset-chip.sel{background:var(--plum);border-color:var(--plum)}
.chip-icon{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.chip-name{font-size:0.75rem;font-weight:500;color:var(--text)}
.asset-chip.sel .chip-name{color:var(--cream)}
.chip-action{font-size:0.57rem;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;padding:0.1rem 0.4rem;border-radius:100px}
.asset-chip.sel .chip-action{background:rgba(255,255,255,0.15);color:rgba(250,246,240,0.75)}
.asset-chip:not(.sel) .chip-ap{background:rgba(99,102,241,0.1);color:var(--blue)}
.asset-chip:not(.sel) .chip-ad{background:rgba(239,68,68,0.08);color:var(--red)}
.asset-chip:not(.sel) .chip-am{background:rgba(34,197,94,0.1);color:var(--green)}

/* content scroll */
.content{flex:1;overflow-y:auto;padding:1.5rem;scrollbar-width:thin;scrollbar-color:var(--border) transparent}

/* ── Step header ── */
.step-hdr{display:flex;align-items:flex-start;gap:0.9rem;margin-bottom:1.25rem}
.step-badge{
  width:42px;height:42px;border-radius:50%;background:var(--plum);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 18px rgba(92,29,59,0.28);
}
.step-badge span{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:700;color:var(--cream)}
.step-hdr-text h2{font-family:'Cormorant Garamond',serif;font-size:1.55rem;font-weight:600;color:var(--text);line-height:1.2}
.step-hdr-text .step-meta{font-size:0.75rem;color:var(--text2);margin-top:0.28rem;line-height:1.6}

/* ── Credentials ── */
.cred-card{
  background:var(--white);border:1.5px solid var(--border);
  border-radius:13px;padding:1rem 1.15rem;margin-bottom:1rem;
}
.cred-heading{font-size:0.59rem;letter-spacing:0.12em;text-transform:uppercase;font-weight:600;color:var(--plum);margin-bottom:0.85rem;display:flex;align-items:center;gap:0.4rem}
.cred-heading svg{width:10px;height:10px;stroke:var(--plum);fill:none;stroke-width:2.5}
.cred-fields{display:grid;grid-template-columns:1fr 1fr;gap:0.65rem}
.cred-field-label{font-size:0.59rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);font-weight:500;margin-bottom:0.28rem}
.cred-field-box{
  display:flex;align-items:center;gap:0.4rem;
  background:var(--cream2);border:1px solid var(--border);
  border-radius:7px;padding:0.5rem 0.75rem;
}
.cred-val{font-family:'DM Mono',monospace;font-size:0.78rem;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pwd-hidden{letter-spacing:0.12em;color:var(--muted);font-size:1rem;line-height:1}
.cred-btn{
  width:26px;height:26px;border-radius:6px;background:var(--white);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all 0.16s;
}
.cred-btn:hover{background:var(--plum-pale);border-color:rgba(92,29,59,0.18)}
.cred-btn svg{width:11px;height:11px;stroke:var(--muted);fill:none;stroke-width:2}
.cred-btn.ok svg{stroke:var(--green)}

/* ── How to do it ── */
.how-card{background:var(--white);border:1px solid var(--border);border-radius:13px;overflow:hidden;margin-bottom:1rem}
.how-header{
  background:var(--plum);padding:0.68rem 1.1rem;
  display:flex;align-items:center;gap:0.45rem;
}
.how-header svg{width:12px;height:12px;stroke:rgba(250,246,240,0.65);fill:none;stroke-width:2}
.how-header span{font-size:0.6rem;letter-spacing:0.12em;text-transform:uppercase;font-weight:600;color:rgba(250,246,240,0.75)}
.how-title{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:600;color:var(--text);padding:0.9rem 1.15rem 0.65rem}
.how-list{padding:0 1.15rem 1rem}
.how-item{display:flex;align-items:flex-start;gap:0.75rem;padding:0.65rem 0;border-bottom:1px solid rgba(92,29,59,0.045)}
.how-item:last-child{border-bottom:none}
.how-icon-box{
  width:32px;height:32px;border-radius:8px;background:var(--cream2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;
}
.how-icon-box svg{width:14px;height:14px;stroke:var(--plum);fill:none;stroke-width:1.8}
.how-item-body{}
.how-item-label{font-size:0.58rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:0.18rem}
.how-item-title{font-size:0.83rem;font-weight:600;color:var(--text);line-height:1.35}
.how-item-detail{font-size:0.76rem;color:var(--text2);line-height:1.6;margin-top:0.18rem}
.how-item-detail code{font-family:'DM Mono',monospace;font-size:0.71rem;background:var(--cream2);border:1px solid var(--border);padding:0.08rem 0.35rem;border-radius:4px;color:var(--plum)}

/* ── Tips ── */
.tips-card{background:rgba(245,158,11,0.05);border:1px solid rgba(245,158,11,0.18);border-radius:13px;padding:0.9rem 1.1rem;margin-bottom:1rem}
.tips-heading{font-size:0.58rem;letter-spacing:0.12em;text-transform:uppercase;font-weight:600;color:var(--amber);margin-bottom:0.65rem;display:flex;align-items:center;gap:0.4rem}
.tips-heading svg{width:11px;height:11px;stroke:var(--amber);fill:none;stroke-width:2}
.tip-row{display:flex;align-items:flex-start;gap:0.55rem;padding:0.28rem 0;font-size:0.78rem;color:var(--text2);line-height:1.6}
.tip-dot{width:6px;height:6px;border-radius:50%;background:var(--amber);flex-shrink:0;margin-top:7px;opacity:0.7}

/* ── Warning banner ── */
.warn-card{background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.18);border-radius:13px;padding:0.9rem 1.1rem;margin-bottom:1rem;display:flex;gap:0.65rem}
.warn-icon{width:32px;height:32px;border-radius:8px;background:rgba(239,68,68,0.1);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.warn-icon svg{width:15px;height:15px;stroke:var(--red);fill:none;stroke-width:2}
.warn-text{font-size:0.79rem;color:var(--text2);line-height:1.65}
.warn-text strong{color:var(--red);font-weight:600}

/* ── Farewell block ── */
.farewell-card{background:linear-gradient(135deg,rgba(92,29,59,0.04),rgba(155,74,110,0.05));border:1px solid rgba(92,29,59,0.12);border-radius:13px;padding:1rem 1.15rem;margin-bottom:1rem}
.farewell-heading{font-size:0.58rem;letter-spacing:0.12em;text-transform:uppercase;font-weight:600;color:var(--plum);margin-bottom:0.6rem;display:flex;align-items:center;gap:0.4rem}
.farewell-heading svg{width:11px;height:11px;stroke:var(--plum);fill:none;stroke-width:2}
.farewell-quote{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-style:italic;color:var(--text);line-height:1.75;border-left:2px solid var(--plum-light);padding-left:0.9rem;margin-left:0.2rem}

/* ── WILL section (overview mode) ── */
.will-section{padding:0.25rem 0 1.25rem}
.section-label{font-size:0.62rem;letter-spacing:0.1em;text-transform:uppercase;font-weight:600;color:var(--plum);margin-bottom:0.9rem}
.will-card{
  background:var(--white);border:1px solid var(--border);
  border-radius:14px;padding:1.15rem 1.25rem;
  display:flex;align-items:center;gap:1.1rem;
}
.will-icon{
  width:44px;height:44px;border-radius:11px;flex-shrink:0;
  background:var(--plum-pale);display:flex;align-items:center;justify-content:center;
}
.will-icon svg{width:20px;height:20px;stroke:var(--plum);fill:none;stroke-width:1.8}
.will-body{flex:1;min-width:0}
.will-title{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:600;color:var(--text)}
.will-meta{font-size:0.73rem;color:var(--text2);margin-top:0.2rem}
.will-badge{
  padding:0.22rem 0.65rem;border-radius:100px;font-size:0.62rem;font-weight:600;letter-spacing:0.04em;
  text-transform:uppercase;border:1px solid rgba(34,197,94,0.25);
  background:rgba(34,197,94,0.08);color:var(--green);flex-shrink:0;
}
.will-btns{display:flex;gap:0.55rem;flex-shrink:0}
.will-btn{
  display:flex;align-items:center;gap:0.35rem;
  padding:0.48rem 1rem;border-radius:8px;
  font-size:0.73rem;font-weight:500;cursor:pointer;
  border:none;font-family:'DM Sans',sans-serif;transition:all 0.18s;
}
.will-btn-view{background:var(--plum);color:var(--cream)}
.will-btn-view:hover{background:var(--plum2)}
.will-btn-dl{background:var(--cream2);color:var(--text2);border:1px solid var(--border)}
.will-btn-dl:hover{background:var(--plum-pale);color:var(--plum);border-color:rgba(92,29,59,0.18)}
.will-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2}

/* ── Bottom nav ── */
.bottom-bar{
  height:56px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:0 1.5rem;background:var(--white);border-top:1px solid var(--border);
}
.bb-prog{display:flex;align-items:center;gap:0.75rem;flex:1}
.bb-label{font-size:0.7rem;color:var(--text2)}
.bb-track{flex:1;max-width:140px;height:2.5px;background:var(--border);border-radius:100px;overflow:hidden}
.bb-fill{height:100%;background:var(--plum);border-radius:100px;transition:width 0.4s ease}
.bb-btns{display:flex;gap:0.55rem}
.bb-btn{
  display:flex;align-items:center;gap:0.4rem;
  padding:0.5rem 1.1rem;border-radius:8px;
  font-size:0.78rem;font-weight:500;cursor:pointer;
  border:none;font-family:'DM Sans',sans-serif;transition:all 0.18s;
}
.bb-prev{background:transparent;border:1.5px solid var(--border);color:var(--text2)}
.bb-prev:hover{border-color:var(--plum);color:var(--plum)}
.bb-prev:disabled{opacity:0.4;cursor:not-allowed;pointer-events:none}
.bb-next{background:var(--plum);color:var(--cream);box-shadow:0 4px 12px rgba(92,29,59,0.22)}
.bb-next:hover{background:var(--plum2)}
.bb-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}
</style>
</head>
<body>
<div class="app">

<!-- ════ SIDEBAR ════ -->
<aside class="sidebar">
  <div class="sb-brand">
    <div class="sb-logo-row">
      <div class="sb-logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2L4 6v6c0 5.5 3.8 10.7 8 12 4.2-1.3 8-6.5 8-12V6l-8-4z"/></svg>
      </div>
      <div class="sb-logo-text">
        <div class="sb-brand-name">Legacy Vault</div>
        <div class="sb-brand-sub">Executor Portal</div>
      </div>
    </div>
    <div class="sb-asset-pill" id="sb-pill"></div>
    <div class="sb-prog">
      <div class="sb-prog-meta"><span id="sb-prog-txt">Step 1 of 5</span><span id="sb-prog-pct">20%</span></div>
      <div class="sb-prog-track"><div class="sb-prog-fill" id="sb-fill" style="width:20%"></div></div>
    </div>
  </div>
  <div class="sb-steps" id="sb-steps"></div>
  <div class="sb-footer">

// ═══════════════════════════════════════
//  API CONFIG
// ═══════════════════════════════════════
const API_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
  ? 'http://localhost:3000'
  : 'https://legacy-vault-backend-l50w.onrender.com';

// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
let ASSETS = [];
let WILL_DATA = null;
let ai = 0, si = 0;
const done = {};
const shown = {};

const asset = () => ASSETS[ai];
const steps = () => {
  const a = asset();
  if (!a) return [];
  const wf = WORKFLOWS[a.name];
  if (!wf) return [];
  return wf[a.action] || wf['pass'] || [];
};

// ═══════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════
async function checkAuth() {
  const token = localStorage.getItem('executorToken');
  if (!token) { window.location.href = '/executor-login.html'; return; }

  const endpoints = ['/api/executor/verify', '/executor/verify'];
  for (const ep of endpoints) {
    try {
      const res = await fetch(`${API_URL}${ep}`, { headers: { 'Authorization': `Bearer ${token}` } });
      if (res.ok) {
        const data = await res.json();
        localStorage.setItem('executorId', data.executorId);
        // Update executor name in footer
        if (data.name || data.email) {
          const initials = (data.name || data.email).split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
          document.querySelector('.sb-exec-ava').textContent = initials;
          document.querySelector('.sb-exec-name').textContent = data.name || data.email;
        }
        return true;
      }
      if (res.status === 401) { localStorage.removeItem('executorToken'); window.location.href = '/executor-login.html'; return false; }
    } catch(e) {}
  }
  return false;
}

// ═══════════════════════════════════════
//  API FETCH
// ═══════════════════════════════════════
async function fetchAssets() {
  const token = localStorage.getItem('executorToken');
  const endpoints = ['/api/executor-portal/assets', '/executor-portal/assets'];
  for (const ep of endpoints) {
    try {
      const res = await fetch(`${API_URL}${ep}`, { headers: { 'Authorization': `Bearer ${token}` } });
      if (res.ok) {
        const data = await res.json();
        return (data.assets || data || []).map(a => ({
          id: String(a.id),
          name: a.asset_name || a.name,
          account: a.email || a.account || '',
          password: a.password || '',
          action: a.action_type || 'pass',
          farewell: a.last_message || ''
        }));
      }
    } catch(e) {}
  }
  return [];
}

async function fetchWill() {
  const token = localStorage.getItem('executorToken');
  const endpoints = ['/api/executor-portal/wills', '/executor-portal/wills'];
  for (const ep of endpoints) {
    try {
      const res = await fetch(`${API_URL}${ep}`, { headers: { 'Authorization': `Bearer ${token}` } });
      if (res.ok) {
        const data = await res.json();
        const wills = data.wills || data || [];
        return wills.length > 0 ? wills[0] : null;
      }
    } catch(e) {}
  }
  return null;
}

async function logWorkflowComplete(assetId, action) {
  const token = localStorage.getItem('executorToken');
  const executorId = Number(localStorage.getItem('executorId'));
  const endpoints = [`/api/assets/${assetId}/workflow-complete`, `/assets/${assetId}/workflow-complete`];
  for (const ep of endpoints) {
    try {
      const res = await fetch(`${API_URL}${ep}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ action, executorId, completedAt: new Date().toISOString() })
      });
      if (res.ok) return;
    } catch(e) {}
  }
}

// ═══════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════
function render(){
  if (!ASSETS.length) return;
  renderAssetBar();
  renderSidebar();
  renderContent();
}

function renderAssetBar(){
  const el = document.getElementById('asset-bar');
  const AL = {pass:'Pass',delete:'Delete',last_message:'Message'};
  const AC = {pass:'chip-ap',delete:'chip-ad',last_message:'chip-am'};
  el.innerHTML = ASSETS.map((a,i)=>{
    const ico = getAppIcon(a.name);
    return `<button class="asset-chip${i===ai?' sel':''}" onclick="selAsset(${i})">
      <div class="chip-icon" style="background:${ico.color}">${ico.svg}</div>
      <span class="chip-name">${a.name}</span>
      <span class="chip-action ${AC[a.action]}">${AL[a.action]||a.action}</span>
    </button>`;
  }).join('');
}

function renderSidebar(){
  const a = asset(); const ss = steps();
  if (!a || !ss.length) return;
  const ico = getAppIcon(a.name);
  const AL = {pass:'Pass to Executor',delete:'Delete Account',last_message:'Last Message'};
  const TC = {pass:'tag-pass',delete:'tag-delete',last_message:'tag-message'};

  document.getElementById('sb-pill').innerHTML =
    `<div class="sb-app-icon" style="background:${ico.color}">${ico.svg}</div>
     <div class="sb-pill-info"><div class="sb-pill-name">${a.name}</div><div class="sb-pill-cat">${a.account}</div></div>
     <span class="sb-action-tag ${TC[a.action]}">${AL[a.action]||a.action}</span>`;

  const pct = Math.round((si+1)/ss.length*100);
  document.getElementById('sb-prog-txt').textContent = `Step ${si+1} of ${ss.length}`;
  document.getElementById('sb-prog-pct').textContent = pct+'%';
  document.getElementById('sb-fill').style.width = pct+'%';

  document.getElementById('sb-steps').innerHTML = ss.map((s,i)=>{
    const key=a.id+'_'+i, isDone=done[key], isActive=i===si;
    return `${i>0?'<div class="sb-connector"></div>':''}
    <div class="sb-step${isActive?' active':''}${isDone?' done':''}" onclick="goStep(${i})">
      <div class="sb-num">${isDone?icon('check',9,'var(--green)'):(i+1)}</div>
      <div class="sb-step-info">
        <div class="sb-step-title">${s.title}</div>
        <div class="sb-step-desc">${s.desc}</div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('tb-asset').textContent = a.name;
  document.getElementById('tb-step').textContent = steps()[si]?.title||'';
  document.getElementById('tb-pill').textContent = `Step ${si+1} of ${ss.length}`;
  document.getElementById('bb-label').textContent = `Step ${si+1} of ${ss.length}`;
  document.getElementById('bb-fill').style.width = pct+'%';
  document.getElementById('btn-prev').disabled = si===0;
  const btnN = document.getElementById('btn-next');
  btnN.innerHTML = si===ss.length-1
    ? `Complete ${icon('check',13,'var(--cream)')}`
    : `Next ${icon('arrow-right',13,'var(--cream)')}`;
}

        <div class="will-meta">${willDate}&nbsp;·&nbsp;${ASSETS.length} assets</div>
      </div>

      <div class="will-btns">
        <button class="will-btn will-btn-view">${icon('file-text',12,'var(--cream)')} View Details</button>
        <button class="will-btn will-btn-dl">${icon('download',12,'var(--text2)')} Download PDF</button>

  }

  html += `

    <div class="step-hdr-text">
      <h2>${s.title}</h2>
      <div class="step-meta">STEP ${si+1} OF ${steps().length} &mdash; ${s.desc}</div>
    </div>

  if(s.warn){
    html += `<div class="warn-card">
      <div class="warn-icon">${icon('alert',15,'var(--red)')}</div>
      <div class="warn-text"><strong>Warning: </strong>${s.warn}</div>
    </div>`;
  }

  if(hasCred){
    const pwDisplay = pwShown ? a.password : '••••••••';
    html += `<div class="cred-card">
      <div class="cred-heading">${icon('lock',10,'var(--plum)')} Login Credentials</div>
      <div class="cred-fields">
        ${a.account?`<div>
          <div class="cred-field-label">Username / Email</div>
          <div class="cred-field-box">
            <span class="cred-val">${a.account}</span>
            <button class="cred-btn" id="c-em-${ai}" onclick="copyVal('${a.account}','c-em-${ai}')">${icon('copy',11,'var(--muted)')}</button>
          </div>
        </div>`:''}
        ${a.password?`<div>
          <div class="cred-field-label">Password</div>
          <div class="cred-field-box">
            <span class="cred-val ${pwShown?'':'pwd-hidden'}">${pwDisplay}</span>
            <button class="cred-btn" onclick="togglePw('${pwKey}')">${icon(pwShown?'eye-off':'eye',11,'var(--muted)')}</button>
            <button class="cred-btn" id="c-pw-${ai}" onclick="copyVal('${a.password}','c-pw-${ai}')">${icon('copy',11,'var(--muted)')}</button>
          </div>
        </div>`:''}
      </div>
    </div>`;
  }

  const substeps = parseAction(s.action, a.action, s.title, ico);
  html += `<div class="how-card">
    <div class="how-header">${icon('check',12,'rgba(250,246,240,0.65)')} <span>How to do it</span></div>
    <div class="how-title">${s.title}</div>
    <div class="how-list">
      ${substeps.map(ss=>`
        <div class="how-item">
          <div class="how-icon-box">${icon(ss.ico,14,'var(--plum)')}</div>
          <div class="how-item-body">
            <div class="how-item-label">${ss.label}</div>
            <div class="how-item-title">${ss.title}</div>
            <div class="how-item-detail">${ss.detail}</div>

        </div>`).join('')}

  </div>`;

  if(s.farewell && a.farewell){
    html += `<div class="farewell-card">
      <div class="farewell-heading">${icon('heart',11,'var(--plum)')} Pre-written Farewell Message</div>
      <div class="farewell-quote">${a.farewell}</div>

  }

  if(s.tips?.length){
    html += `<div class="tips-card">

// ── Parse action string into visual substeps ──
function parseAction(actionStr, actionType, stepTitle, ico){
  if(!actionStr) return [{ico:'check',label:'ACTION',title:stepTitle,detail:'Follow the instructions carefully.'}];
  const parts = actionStr.split('→').map(p=>p.trim()).filter(Boolean);
  function pickIcon(text){
    const t = text.toLowerCase();
    if(t.includes('open browser')||t.includes('web browser')) return 'globe';
    if(t.includes('go to ')||t.includes('navigate')||t.includes('visit')) return 'external-link';
    if(t.includes('click \"log in\"')||t.includes('login')||t.includes('sign in')) return 'log';
    if(t.includes('password')||t.includes('enter password')) return 'lock';
    if(t.includes('enter your email')||t.includes('username')) return 'user';
    if(t.includes('settings')||t.includes('preferences')) return 'settings';
    if(t.includes('search')) return 'search';
    if(t.includes('screenshot')) return 'camera';
    if(t.includes('document')||t.includes('create')) return 'file-text';
    if(t.includes('delete')||t.includes('remove')||t.includes('close account')) return 'trash';
    if(t.includes('transfer')||t.includes('send')||t.includes('withdraw')) return 'send';
    if(t.includes('contact')||t.includes('call')||t.includes('phone')) return 'phone';
    if(t.includes('email')||t.includes('compose')) return 'mail';
    if(t.includes('message')) return 'message';
    if(t.includes('verify')||t.includes('confirm')||t.includes('check')) return 'check';
    if(t.includes('download')) return 'download';
    if(t.includes('2fa')||t.includes('two-factor')) return 'shield';
    return 'arrow-right';
  }
  if(parts.length <= 5){
    return parts.map((p,i)=>({
      ico: pickIcon(p), label: `STEP ${i+1}`,
      title: p.length > 60 ? p.substring(0,57)+'…' : p,
      detail: p.length > 60 ? p : ''
    }));
  }
  const chunk = Math.ceil(parts.length/4);
  const groups = [];
  for(let i=0;i<parts.length;i+=chunk){
    const grp = parts.slice(i,i+chunk);
    groups.push({
      ico: pickIcon(grp[0]), label: `STEP ${groups.length+1}`,
      title: grp[0].length > 65 ? grp[0].substring(0,62)+'…' : grp[0],
      detail: grp.slice(1).join(' → ')
    });
  }
  return groups;
}

// ═══════════════════════════════════════
//  ACTIONS
// ═══════════════════════════════════════
function selAsset(i){ ai=i; si=0; render(); }
function goStep(i){ si=i; render(); }
function markDone(){
  const a = asset();
  done[a.id+'_'+si]=true;
  renderSidebar();
  // log if final step
  if(si===steps().length-1) logWorkflowComplete(a.id, a.action).catch(()=>{});
}
function next(){
  markDone();
  if(si<steps().length-1){ si++; render(); }
}
function prev(){
  if(si>0){ si--; render(); }
}
function togglePw(key){ shown[key]=!shown[key]; renderContent(); }
function copyVal(val,btnId){
  navigator.clipboard.writeText(val).catch(()=>{});
  const b=document.getElementById(btnId);
  if(b){ const orig=b.innerHTML; b.innerHTML=icon('check',11,'var(--green)'); b.classList.add('ok'); setTimeout(()=>{b.innerHTML=orig;b.classList.remove('ok');},1500); }
}

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
(async () => {
  const ok = await checkAuth();
  if (!ok) return;

  document.getElementById('content').innerHTML = '<p style="padding:3rem;text-align:center;color:var(--muted)">Loading assets…</p>';

  [ASSETS, WILL_DATA] = await Promise.all([fetchAssets(), fetchWill()]);

  if (!ASSETS.length) {
    document.getElementById('content').innerHTML = '<p style="padding:3rem;text-align:center;color:var(--muted)">No assets assigned to you yet.</p>';
    document.getElementById('asset-bar').innerHTML = '';
    return;
  }

  render();
})();
