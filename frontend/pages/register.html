<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Legacy Vault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
          --cream:#faf6f0;
          --cream2:#f3ede3;
          --plum:#5c1d3b;
          --plum2:#7a2d52;
          --plum-light:#9b4a6e;
          --plum-pale:#f5e8ef;
          --muted:#b8a4b0;
          --text:#2e1a24;
          --text2:#6b4f5e;
          --white:#fff;
          --shadow:rgba(92,29,59,0.12);
        }
        html{scroll-behavior:smooth}
        body{
          font-family:'DM Sans',sans-serif;
          background:var(--cream);
          color:var(--text);
          overflow-x:hidden;
        }
        
        /* Background blobs */
        .bg-blob-1,.bg-blob-2,.bg-blob-3{position:fixed;pointer-events:none;z-index:0}
        .bg-blob-1{top:-180px;right:-180px;width:650px;height:650px;background:radial-gradient(circle,rgba(155,74,110,0.07) 0%,transparent 70%)}
        .bg-blob-2{bottom:5%;left:-180px;width:550px;height:550px;background:radial-gradient(circle,rgba(92,29,59,0.06) 0%,transparent 70%)}
        .bg-blob-3{top:40%;right:-100px;width:400px;height:400px;background:radial-gradient(circle,rgba(245,232,239,0.5) 0%,transparent 70%)}
        
        /* NAV */
        nav{
          position:fixed;top:0;left:0;right:0;z-index:100;
          display:flex;align-items:center;justify-content:space-between;
          padding:1.25rem 4rem;
          background:rgba(250,246,240,0.85);
          backdrop-filter:blur(20px);
          border-bottom:1px solid rgba(92,29,59,0.08);
          transition:all 0.3s ease;
        }
        .nav-logo{
          display:flex;align-items:center;gap:0.6rem;
          font-family:'Cormorant Garamond',serif;
          font-size:1.35rem;font-weight:600;
          color:var(--plum);letter-spacing:0.04em;text-decoration:none;
        }
        .nav-logo-icon{
          width:32px;height:32px;
          background:var(--plum);
          border-radius:8px;
          display:flex;align-items:center;justify-content:center;
        }
        .nav-logo-icon svg{width:18px;height:18px;fill:var(--cream)}
        
        /* Register Container */
        .register-container{
          position:relative;
          z-index:1;
          min-height:100vh;
          display:flex;
          align-items:center;
          justify-content:center;
          padding:8rem 2rem 2rem;
        }
        
        .register-box{
          background:var(--white);
          border-radius:24px;
          padding:3rem;
          box-shadow:0 20px 60px rgba(92,29,59,0.15);
          max-width:450px;
          width:100%;
        }
        
        .register-box h1{
          font-family:'Cormorant Garamond',serif;
          font-size:2rem;
          font-weight:600;
          color:var(--plum);
          margin-bottom:0.5rem;
          text-align:center;
        }
        
        .register-box .subtitle{
          font-size:0.85rem;
          color:var(--text2);
          text-align:center;
          margin-bottom:2rem;
          font-style:italic;
        }
        
        .form-group{
          margin-bottom:1.25rem;
        }
        
        .form-group label{
          display:block;
          font-size:0.85rem;
          font-weight:500;
          color:var(--text);
          margin-bottom:0.5rem;
          letter-spacing:0.01em;
        }
        
        .form-group input{
          width:100%;
          padding:0.75rem 1rem;
          border:1.5px solid rgba(92,29,59,0.15);
          border-radius:8px;
          font-size:0.95rem;
          font-family:'DM Sans',sans-serif;
          transition:all 0.2s;
          color:var(--text);
        }
        
        .form-group input:focus{
          outline:none;
          border-color:var(--plum);
          box-shadow:0 0 0 3px rgba(92,29,59,0.1);
        }
        
        .form-row{
          display:grid;
          grid-template-columns:1fr 1fr;
          gap:1rem;
        }
        
        .form-row .form-group{
          margin-bottom:0;
        }
        
        .register-btn{
          width:100%;
          padding:0.875rem;
          background:var(--plum);
          color:var(--cream);
          border:none;
          border-radius:8px;
          font-size:0.95rem;
          font-weight:600;
          cursor:pointer;
          transition:all 0.25s ease;
          box-shadow:0 4px 20px rgba(92,29,59,0.25);
          margin-top:1rem;
        }
        
        .register-btn:hover{
          background:var(--plum2);
          transform:translateY(-2px);
          box-shadow:0 8px 30px rgba(92,29,59,0.35);
        }
        
        .login-link{
          text-align:center;
          margin-top:1.5rem;
          font-size:0.85rem;
          color:var(--text2);
        }
        
        .login-link a{
          color:var(--plum);
          text-decoration:none;
          font-weight:600;
          transition:color 0.2s;
        }
        
        .login-link a:hover{
          color:var(--plum2);
        }
        
        .back-link{
          display:flex;
          align-items:center;
          gap:0.5rem;
          text-decoration:none;
          color:var(--plum);
          font-weight:500;
          position:absolute;
          top:1.25rem;
          right:4rem;
          transition:color 0.2s;
        }
        
        .back-link:hover{
          color:var(--plum2);
        }
        
        @media(max-width:900px){
          nav{padding:1rem 1.5rem}
          .register-container{padding:6rem 1.5rem 2rem}
          .register-box{padding:2rem}
          .form-row{grid-template-columns:1fr}
          .back-link{right:1.5rem}
        }
    </style>
</head>
<body>

<!-- BACKGROUND BLOBS -->
<div class="bg-blob-1"></div>
<div class="bg-blob-2"></div>
<div class="bg-blob-3"></div>

<!-- NAVBAR -->
<nav>
  <a href="/" class="nav-logo">
    <div class="nav-logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2L4 6v6c0 5.5 3.8 10.7 8 12 4.2-1.3 8-6.5 8-12V6l-8-4z" fill="currentColor"/></svg>
    </div>
    Legacy Vault
  </a>
  <a href="/" class="back-link">← Back</a>
</nav>

<!-- REGISTER CONTAINER -->
<div class="register-container">
  <div class="register-box">
    <h1>Create Your Account</h1>
    <p class="subtitle">Start protecting your digital legacy</p>
    
    <form id="registerForm">
      <div class="form-row">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" id="firstName" placeholder="John" required>
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" id="lastName" placeholder="Doe" required>
        </div>
      </div>
      
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="your@email.com" required>
      </div>
      
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="••••••••" required>
      </div>
      
      <button type="submit" class="register-btn">Create Account</button>
    </form>
    
    <p class="login-link">
      Already have an account? <a href="/pages/user-login.html">Sign in</a>
    </p>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
document.getElementById('registerForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  
  const firstName = document.getElementById('firstName').value;
  const lastName = document.getElementById('lastName').value;
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;
  
  if (password !== confirmPassword) {
    alert('Passwords do not match!');
    return;
  }
  
  if (password.length < 6) {
    alert('Password must be at least 6 characters long');
    return;
  }
  
  try {
    const result = await registerUser(email, password, firstName, lastName);
    alert('Account created successfully! Redirecting to dashboard...');
    window.location.href = '/pages/dashboard.html';
  } catch (error) {
    alert('Registration failed: ' + error.message);
    console.error('Registration error:', error);
  }
});
</script>

</body>
</html>
