<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dead Man's Switches - LEGACY VAULT</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="sidebar-brand">LEGACY VAULT</div>
      <ul class="sidebar-nav">
        <li><a href="/pages/dashboard.html">Dashboard</a></li>
        <li><a href="/pages/assets.html">Assets</a></li>
        <li><a href="/pages/executors.html">Executors</a></li>
        <li><a href="/pages/wills.html">Wills</a></li>
        <li><a href="/pages/switches.html" class="active">Switches</a></li>
        <li><a href="/" onclick="logoutUser()">Logout</a></li>
      </ul>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h1>Dead Man's Switches</h1>
        <button class="btn btn-primary" onclick="openModal('addSwitchModal')">Create Switch</button>
      </div>

      <div id="switchesContainer"></div>
    </div>
  </div>

  <!-- Add Switch Modal -->
  <div id="addSwitchModal" class="modal">
    <div class="modal-content" style="max-width: 600px;">
      <div class="modal-header">
        <h2>Setup Dead Man's Switch</h2>
        <button class="modal-close" onclick="closeModal('addSwitchModal')">×</button>
      </div>
      <form id="addSwitchForm">
        <div class="form-group">
          <label>Trigger Type</label>
          <select id="triggerType" required>
            <option value="">Select Type</option>
            <option value="inactivity_days">Inactivity (days)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Trigger Value (days)</label>
          <input type="number" id="triggerValue" placeholder="e.g., 30" min="1" required>
        </div>
        <div class="form-group">
          <label>Action Type</label>
          <select id="actionType" required>
            <option value="">Select Action</option>
            <option value="notify_executor">Notify Executor</option>
            <option value="release_assets">Release Assets</option>
            <option value="notify_family">Notify Family</option>
            <option value="publish_will">Publish Will</option>
          </select>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="switchDescription" placeholder="Describe this switch..."></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Create Switch</button>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    redirectToLogin();

    async function loadSwitches() {
      try {
        const data = await getSwitches();
        const container = document.getElementById('switchesContainer');

        if (!data.switches || data.switches.length === 0) {
          container.innerHTML = '<div class="alert alert-info">No switches setup yet.</div>';
          return;
        }

        container.innerHTML = data.switches.map(switchItem => `
          <div class="card">
            <div class="card-header">
              <div>
                <h3>${switchItem.trigger_type}</h3>
                <p style="color: var(--text-light); font-size: 12px;">Action: ${switchItem.action_type}</p>
              </div>
              <div style="display: flex; gap: 10px;">
                <button class="btn btn-secondary btn-sm" onclick="pingSwitch(${switchItem.id})">🔄 Ping</button>
                <button class="btn btn-danger btn-sm" onclick="confirmDelete(${switchItem.id})">Delete</button>
              </div>
            </div>
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 15px;">
              <div>
                <p style="color: var(--text-light); font-size: 12px;">Trigger Value</p>
                <p style="font-weight: 600;">${switchItem.trigger_value} days</p>
              </div>
              <div>
                <p style="color: var(--text-light); font-size: 12px;">Status</p>
                <p style=\"font-weight: 600;\">${switchItem.is_active ? 'Active' : 'Inactive'}</p>
              </div>
              <div>
                <p style="color: var(--text-light); font-size: 12px;">Last Check</p>
                <p style="font-weight: 600;">${switchItem.last_check ? new Date(switchItem.last_check).toLocaleDateString() : 'Never'}</p>
              </div>
            </div>
            <p style="font-size: 12px; color: var(--text-light);">${switchItem.description || 'No description'}</p>
          </div>
        `).join('');
      } catch (error) {
        showAlert('Error loading switches: ' + error.message, 'danger');
      }
    }

    async function pingSwitch(switchId) {
      try {
        await pingSwitch(switchId);
        showAlert('Switch pinged successfully', 'success');
        loadSwitches();
      } catch (error) {
        showAlert('Error: ' + error.message, 'danger');
      }
    }

    async function confirmDelete(switchId) {
      if (confirm('Are you sure you want to delete this switch?')) {
        try {
          await deleteSwitch(switchId);
          showAlert('Switch deleted successfully', 'success');
          loadSwitches();
        } catch (error) {
          showAlert('Error: ' + error.message, 'danger');
        }
      }
    }

    document.getElementById('addSwitchForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      try {
        await createSwitch(
          document.getElementById('triggerType').value,
          parseInt(document.getElementById('triggerValue').value),
          document.getElementById('actionType').value,
          document.getElementById('switchDescription').value
        );

        showAlert('Switch created successfully', 'success');
        closeModal('addSwitchModal');
        document.getElementById('addSwitchForm').reset();
        loadSwitches();
      } catch (error) {
        showAlert('Error: ' + error.message, 'danger');
      }
    });

    loadSwitches();
  </script>
</body>
</html>
