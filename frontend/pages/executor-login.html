<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executor Login - Legacy Vault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
          --cream:#faf6f0;
          --cream2:#f3ede3;
          --plum:#5c1d3b;
          --plum2:#7a2d52;
          --plum-light:#9b4a6e;
          --plum-pale:#f5e8ef;
          --muted:#b8a4b0;
          --text:#2e1a24;
          --text2:#6b4f5e;
          --white:#fff;
          --shadow:rgba(92,29,59,0.12);
        }
        html{scroll-behavior:smooth}
        body{
          font-family:'DM Sans',sans-serif;
          background:var(--cream);
          color:var(--text);
          overflow-x:hidden;
        }
        
        /* Background blobs */
        .bg-blob-1,.bg-blob-2,.bg-blob-3{position:fixed;pointer-events:none;z-index:0}
        .bg-blob-1{top:-180px;right:-180px;width:650px;height:650px;background:radial-gradient(circle,rgba(155,74,110,0.07) 0%,transparent 70%)}
        .bg-blob-2{bottom:5%;left:-180px;width:550px;height:550px;background:radial-gradient(circle,rgba(92,29,59,0.06) 0%,transparent 70%)}
        .bg-blob-3{top:40%;right:-100px;width:400px;height:400px;background:radial-gradient(circle,rgba(245,232,239,0.5) 0%,transparent 70%)}
        
        /* NAV */
        nav{
          position:fixed;top:0;left:0;right:0;z-index:100;
          display:flex;align-items:center;justify-content:space-between;
          padding:1.25rem 4rem;
          background:rgba(250,246,240,0.85);
          backdrop-filter:blur(20px);
          border-bottom:1px solid rgba(92,29,59,0.08);
          transition:all 0.3s ease;
        }
        .nav-logo{
          display:flex;align-items:center;gap:0.6rem;
          font-family:'Cormorant Garamond',serif;
          font-size:1.35rem;font-weight:600;
          color:var(--plum);letter-spacing:0.04em;text-decoration:none;
        }
        .nav-logo-icon{
          width:32px;height:32px;
          background:var(--plum);
          border-radius:8px;
          display:flex;align-items:center;justify-content:center;
        }
        .nav-logo-icon svg{width:18px;height:18px;fill:var(--cream)}
        
        /* Login Container */
        .login-container{
          position:relative;
          z-index:1;
          min-height:100vh;
          display:flex;
          align-items:center;
          justify-content:center;
          padding:8rem 2rem 2rem;
        }
        
        .login-box{
          background:var(--white);
          border-radius:24px;
          padding:3rem;
          box-shadow:0 20px 60px rgba(92,29,59,0.15);
          max-width:400px;
          width:100%;
          border-top:3px solid var(--plum2);
        }
        
        .login-box h1{
          font-family:'Cormorant Garamond',serif;
          font-size:2rem;
          font-weight:600;
          color:var(--plum2);
          margin-bottom:0.5rem;
          text-align:center;
        }
        
        .login-box .subtitle{
          font-size:0.85rem;
          color:var(--text2);
          text-align:center;
          margin-bottom:2rem;
          font-style:italic;
        }
        
        .executor-badge{
          display:inline-block;
          background:var(--plum-pale);
          color:var(--plum2);
          padding:0.4rem 1rem;
          border-radius:20px;
          font-size:0.7rem;
          font-weight:600;
          letter-spacing:0.08em;
          text-transform:uppercase;
          margin:0 auto 1.5rem;
          width:fit-content;
          text-align:center;
        }
        
        .form-group{
          margin-bottom:1.5rem;
        }
        
        .form-group label{
          display:block;
          font-size:0.85rem;
          font-weight:500;
          color:var(--text);
          margin-bottom:0.5rem;
          letter-spacing:0.01em;
        }
        
        .form-group input{
          width:100%;
          padding:0.75rem 1rem;
          border:1.5px solid rgba(92,29,59,0.15);
          border-radius:8px;
          font-size:0.95rem;
          font-family:'DM Sans',sans-serif;
          transition:all 0.2s;
          color:var(--text);
        }
        
        .form-group input:focus{
          outline:none;
          border-color:var(--plum2);
          box-shadow:0 0 0 3px rgba(122,45,82,0.1);
        }
        
        .login-btn{
          width:100%;
          padding:0.875rem;
          background:var(--plum2);
          color:var(--cream);
          border:none;
          border-radius:8px;
          font-size:0.95rem;
          font-weight:600;
          cursor:pointer;
          transition:all 0.25s ease;
          box-shadow:0 4px 20px rgba(122,45,82,0.25);
        }
        
        .login-btn:hover{
          background:var(--plum);
          transform:translateY(-2px);
          box-shadow:0 8px 30px rgba(122,45,82,0.35);
        }
        
        .signup-link{
          text-align:center;
          margin-top:1.5rem;
          font-size:0.85rem;
          color:var(--text2);
        }
        
        .signup-link a{
          color:var(--plum2);
          text-decoration:none;
          font-weight:600;
          transition:color 0.2s;
        }
        
        .signup-link a:hover{
          color:var(--plum);
        }
        
        .back-link{
          display:flex;
          align-items:center;
          gap:0.5rem;
          text-decoration:none;
          color:var(--plum2);
          font-weight:500;
          position:absolute;
          top:1.25rem;
          right:4rem;
          transition:color 0.2s;
        }
        
        .back-link:hover{
          color:var(--plum);
        }
        
        @media(max-width:900px){
          nav{padding:1rem 1.5rem}
          .login-container{padding:6rem 1.5rem 2rem}
          .login-box{padding:2rem}
          .back-link{right:1.5rem}
        }
    </style>
</head>
<body>

<!-- BACKGROUND BLOBS -->
<div class="bg-blob-1"></div>
<div class="bg-blob-2"></div>
<div class="bg-blob-3"></div>

<!-- NAVBAR -->
<nav>
  <a href="/" class="nav-logo">
    <div class="nav-logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2L4 6v6c0 5.5 3.8 10.7 8 12 4.2-1.3 8-6.5 8-12V6l-8-4z" fill="currentColor"/></svg>
    </div>
    Legacy Vault
  </a>
  <a href="/" class="back-link">← Back</a>
</nav>

<!-- LOGIN CONTAINER -->
<div class="login-container">
  <div class="login-box">
    <div class="executor-badge">● Executor Portal</div>
    <h1>Executor Access</h1>
    <p class="subtitle">Manage digital legacies</p>
    
    <form id="executorLoginForm">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="your@email.com" required>
      </div>
      
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      
      <button type="submit" class="login-btn">Sign In</button>
    </form>
    
    <p class="signup-link">
      Need an invitation? <a href="/">Contact support</a>
    </p>
  </div>
</div>

<script>
document.getElementById('executorLoginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  
  // Here you would normally send this to your backend
  console.log('Executor login attempt:', { email, password });
  
  // For demo, show success
  alert('Executor login successful! Redirecting to portal...');
  // window.location.href = '/pages/executor-portal.html';
});
</script>

</body>
</html>
